<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">

    <title>Weather App</title>

  <body>
    <div class="weather-info">
    <header class="form-input">
      <form class="form-info" id="form-info">
        <input type="search" placeholder="Enter a city..." required class="city-input" id="city-input"/>
        <input type="submit" value="Search" class="submit-button" id="submit-button" />
      </form>
    </header>
    <h1>Paris</h1>
    <p>
    <main class="weather-details">
    <div>
Saturday 23:58, broken clouds 
<br>
Humidity: <strong>51%</strong>, Wind: <strong>3.6km/h</strong></p>
    </div>
    <span>
    <span class="weather-icon">
        🌧️ 
    </span>
    <span class="weather-temp">
       20 
    </span>
    <span class="weather-symbol">
    °C 
    </span>
</span>
</main>
